site_name: Kjell Hedström
site_url: https://kjellkod.github.io/
site_description: >-
  Engineering notes and projects: AI orchestration, mission- and safety-critical
  systems, C++ and Python.
site_author: Kjell Hedström
copyright: Copyright &copy; Kjell Hedström

theme:
  name: material
  icon:
    logo: material/cube-outline
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Projects: projects.md
  - Blog:
      - blog/index.md

plugins:
  - search
  - blog:
      blog_dir: blog
      post_excerpt: optional
      post_url_format: "{slug}"
      archive_date_format: MMMM yyyy

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/KjellKod
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/kjellkod
      name: LinkedIn
